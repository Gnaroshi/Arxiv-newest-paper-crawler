<!doctype html>
<html lang="en" data-theme="{{ 'dark' if showcase and request.args.get('theme') != 'light' else 'light' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='identity/favicon-32.png') }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='identity/apple-touch-icon.png') }}" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <title>Arxiv Discovery</title>
    <style>
      .subject-container {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin: 0.75rem 0;
      }
      .subject-badge {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--muted-border-color);
        border-radius: var(--border-radius);
        overflow: hidden;
        font-size: 0.875em;
      }
      .subject-badge code {
        padding: 0.25rem 0.5rem;
        background-color: var(--muted-bg-color);
        border-radius: 0;
      }
      .subject-badge mark {
        padding: 0.25rem 0.5rem;
        background-color: transparent;
      }
      .demo-banner { padding: .7rem 1rem; border: 1px solid #c57b34; border-radius: .35rem; background: #fff3e6; color: #6d3b11; }
      .workflow-actions { display: flex; flex-wrap: wrap; gap: .65rem; }
    </style>
  </head>
  <body>
    <main class="container">
      <nav>
        <ul>
          <li><strong>Arxiv Discovery</strong></li>
        </ul>
        <ul>
          <li><a href="{{ url_for('index') }}">⭐ Saved Papers</a></li>
          <li><a href="{{ url_for('all_papers') }}">📋 All Papers</a></li>
        </ul>
      </nav>

      {% if showcase %}<p class="demo-banner"><strong>Example data.</strong> No network request or PDF download is performed.</p>{% endif %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
